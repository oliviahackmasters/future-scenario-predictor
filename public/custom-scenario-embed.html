<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Custom Scenario Plotter</title>
  <style>
    :root {
      --bg: #020202;
      --panel: #070707;
      --panel-warm: #180d08;
      --orange: #d46f2d;
      --orange-bright: #e08a53;
      --orange-fill: #dc8756;
      --text: #f1f1f1;
      --muted: #8f8f8f;
      --line: #a45422;
      --disabled: #252525;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 Arial, Helvetica, sans-serif;
      letter-spacing: .01em;
    }
    .fsp-widget {
      width: 100%;
      max-width: 1230px;
      margin: 14px auto;
      padding: 19px;
      background: var(--bg);
      border: 1px solid var(--line);
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .brand {
      border: 1px solid var(--orange);
      color: var(--orange-bright);
      padding: 8px 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .title {
      font-weight: 800;
      letter-spacing: .09em;
      text-transform: uppercase;
      font-size: 16px;
    }
    .intro {
      color: #d7d7d7;
      margin: 2px 0 14px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }
    .button-row { display: flex; flex-wrap: wrap; gap: 9px; }
    .done { color: #d7d7d7; text-transform: uppercase; letter-spacing: .12em; }
    input, textarea, button {
      font: inherit;
      border-radius: 0;
    }
    input, textarea {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--line);
      outline: none;
      padding: 12px 14px;
      min-height: 48px;
      font-size: 15px;
    }
    textarea { resize: vertical; min-height: 48px; }
    input::placeholder, textarea::placeholder { color: #8c8c8c; opacity: 1; text-transform: uppercase; }
    button {
      cursor: pointer;
      border: 1px solid var(--orange);
      background: var(--bg);
      color: var(--text);
      padding: 13px 16px;
      min-height: 47px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    button:hover { background: #120905; }
    button:disabled { opacity: 0.55; cursor: wait; }
    .primary { background: var(--orange-fill); color: #0c0c0c; border-color: var(--orange-fill); }
    .primary:hover { filter: brightness(1.05); background: var(--orange-fill); }
    .tabs { border-bottom: 1px solid var(--line); padding-bottom: 15px; margin-bottom: 15px; }
    .tab.active { background: var(--orange-fill); color: #0b0b0b; }
    .scenario-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.35fr) 118px;
      gap: 10px;
      align-items: stretch;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--line);
    }
    .scenario-row { display: contents; }
    .go {
      grid-column: 3;
      grid-row: 1 / span 4;
      min-height: 224px;
      font-size: 13px;
    }
    .results {
      margin-top: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .result-card {
      min-height: 82px;
      border: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text);
      padding: 14px;
    }
    .result-card:nth-child(2n) { background: #120906; }
    .result-card strong { color: var(--orange-bright); text-transform: uppercase; letter-spacing: .06em; }
    .sources {
      margin-top: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 136px;
      gap: 10px;
      align-items: stretch;
    }
    .section-label {
      color: var(--orange-bright);
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      align-self: center;
    }
    .sources-title {
      grid-column: 1 / -1;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--line);
      padding: 11px 14px;
      background: var(--panel);
    }
    .source-line {
      border: 1px solid var(--line);
      background: var(--bg);
      min-height: 48px;
      display: flex;
      align-items: center;
      padding: 11px 14px;
      color: #dcdcdc;
    }
    .source-toggle {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--orange);
      min-height: 48px;
      font-size: 12px;
    }
    .source-toggle.off { background: var(--disabled); color: #8b8b8b; border-color: #6d391c; }
    .source-editor {
      margin-top: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--line);
    }
    .source-editor summary {
      cursor: pointer;
      color: var(--orange-bright);
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      list-style: none;
    }
    .source-editor summary::-webkit-details-marker { display: none; }
    .source-editor-grid { margin-top: 12px; display: grid; grid-template-columns: 1fr 2fr 90px auto; gap: 10px; }
    .status, .evidence {
      margin-top: 15px;
      color: #dcdcdc;
      font-size: 14px;
    }
    .evidence {
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      padding: 12px 14px;
      background: var(--panel);
    }
    .evidence:empty { display: none; }
    .evidence a { color: var(--text); }
    .small { font-size: 12px; color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; }
    @media (max-width: 720px) {
      .fsp-widget { margin: 0; border-left: 0; border-right: 0; padding: 14px; }
      .toolbar { align-items: flex-start; }
      .scenario-grid { grid-template-columns: 1fr; }
      .scenario-row { display: grid; gap: 8px; }
      .go { grid-column: auto; grid-row: auto; min-height: 48px; }
      .results { grid-template-columns: 1fr; }
      .sources { grid-template-columns: 1fr; }
      .source-editor-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="fsp-widget" id="fsp-widget">
    <div class="topbar">
      <div class="brand">Hackmasters</div>
      <div class="title">Scenario Plotter</div>
    </div>
    <p class="intro">Enter scenarios, add signal lists, and ask questions grounded in selected source feeds.</p>
    <div class="toolbar">
      <div class="button-row"><button type="button" id="new-session">New session</button></div>
      <div class="done">Done</div>
    </div>
    <div class="tabs button-row">
      <button type="button" class="tab">Luxury</button>
      <button type="button" class="tab">Banking</button>
      <button type="button" class="tab active">Retail</button>
      <button type="button" class="tab">Government</button>
      <button type="button" class="tab">OSINT</button>
    </div>

    <div class="scenario-grid" id="scenario-grid"></div>

    <div class="results" id="results"></div>

    <div class="sources" id="sources"></div>

    <details class="source-editor">
      <summary>Add / edit source URLs</summary>
      <div class="source-editor-grid">
        <input id="new-source-name" placeholder="SOURCE NAME" />
        <input id="new-source-url" placeholder="RSS FEED URL" />
        <input id="new-source-reliability" placeholder="70" inputmode="numeric" />
        <button id="add-source" type="button">Add</button>
      </div>
      <p class="small">Use RSS feed URLs. Reliability is 0-100 and is multiplied by signal relevance to produce weighting.</p>
    </details>

    <div class="status" id="status"></div>
    <div class="evidence" id="evidence"></div>
  </div>

  <script>
    (function () {
      const API_BASE = new URLSearchParams(location.search).get('api') || location.origin;
      const API_URL = API_BASE.replace(/\/$/, '') + '/api/custom-scenario-assessment';

      const defaultSources = [
        { id: 'bbc-world', name: 'BBC World', url: 'http://feeds.bbci.co.uk/news/world/rss.xml', reliability: 82, enabled: true },
        { id: 'guardian-world', name: 'Guardian World', url: 'https://www.theguardian.com/world/rss', reliability: 78, enabled: true },
        { id: 'al-jazeera', name: 'Al Jazeera', url: 'https://www.aljazeera.com/xml/rss/all.xml', reliability: 75, enabled: true },
        { id: 'ft-news', name: 'Financial Times', url: 'https://www.ft.com/news-feed?format=rss', reliability: 84, enabled: true },
        { id: 'google-news', name: 'Google News', url: 'https://news.google.com/rss?hl=en-GB&gl=GB&ceid=GB:en', reliability: 65, enabled: true }
      ];

      const state = {
        sources: JSON.parse(localStorage.getItem('fsp-custom-sources') || 'null') || defaultSources,
        latest: null
      };

      const scenarioGrid = document.getElementById('scenario-grid');
      const results = document.getElementById('results');
      const sources = document.getElementById('sources');
      const status = document.getElementById('status');
      const evidence = document.getElementById('evidence');

      function renderScenarios() {
        scenarioGrid.innerHTML = '';
        for (let i = 0; i < 4; i += 1) {
          const row = document.createElement('div');
          row.className = 'scenario-row';
          row.innerHTML = `
            <input id="scenario-${i}" placeholder="${i === 0 ? 'Describe scenario' : `Describe scenario ${i + 1} (optional)`}" />
            <textarea id="signals-${i}" placeholder="List signals"></textarea>
          `;
          scenarioGrid.appendChild(row);
        }
        const go = document.createElement('button');
        go.className = 'go primary';
        go.id = 'go';
        go.type = 'button';
        go.textContent = 'Generate';
        go.addEventListener('click', assess);
        scenarioGrid.appendChild(go);
      }

      function renderEmptyResults() {
        results.innerHTML = '';
        for (let i = 0; i < 4; i += 1) {
          const card = document.createElement('div');
          card.className = 'result-card';
          card.id = `result-${i}`;
          card.innerHTML = i === 0
            ? '<span><strong>Scenario likelihood</strong><br>%</span>'
            : `<span><strong>Scenario ${i + 1} likelihood</strong><br>%<br><span class="small">if entered</span></span>`;
          results.appendChild(card);
        }
      }

      function renderSources(sourceWeightsByName) {
        sources.innerHTML = '<div class="sources-title"><span class="section-label">Sources used</span><button type="button">Show</button></div>';
        state.sources.forEach((source, index) => {
          const weight = sourceWeightsByName?.get(source.name);
          const line = document.createElement('div');
          line.className = 'source-line';
          line.textContent = weight
            ? `${source.name}: relevancy ${Math.round(weight.relevance_percent)}% reliability ${Math.round(weight.reliability_percent)}% = weighting ${Math.round(weight.weighting_percent)}%`
            : `${source.name}: reliability ${source.reliability}%`;

          const toggle = document.createElement('button');
          toggle.className = 'source-toggle' + (source.enabled ? '' : ' off');
          toggle.type = 'button';
          toggle.textContent = source.enabled ? 'Select / deselect' : 'Deselected';
          toggle.addEventListener('click', () => {
            state.sources[index].enabled = !state.sources[index].enabled;
            persistSources();
            renderSources(sourceWeightsByName);
          });

          sources.appendChild(line);
          sources.appendChild(toggle);
        });
      }

      function persistSources() {
        localStorage.setItem('fsp-custom-sources', JSON.stringify(state.sources));
      }

      function collectScenarios() {
        const scenarios = [];
        for (let i = 0; i < 4; i += 1) {
          const description = document.getElementById(`scenario-${i}`).value.trim();
          const signals = document.getElementById(`signals-${i}`).value
            .split(/[\n,;]+/)
            .map((item) => item.trim())
            .filter(Boolean);
          if (description && signals.length) {
            scenarios.push({ name: description.slice(0, 80), description, signals });
          }
        }
        return scenarios;
      }

      async function assess() {
        const scenarios = collectScenarios();
        if (!scenarios.length) {
          status.textContent = 'Enter at least one scenario and at least one signal.';
          return;
        }

        const selectedSources = state.sources.filter((source) => source.enabled);
        if (!selectedSources.length) {
          status.textContent = 'Select at least one source.';
          return;
        }

        const go = document.getElementById('go');
        go.disabled = true;
        status.textContent = 'Scanning selected sources and estimating likelihood...';
        evidence.innerHTML = '';

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scenarios, sources: selectedSources })
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Assessment failed');
          state.latest = data;
          renderAssessment(data, scenarios);
          status.textContent = `Assessment complete. Confidence: ${data.confidence || 'low'}.`;
        } catch (error) {
          status.textContent = error.message || 'Assessment failed.';
        } finally {
          go.disabled = false;
        }
      }

      function renderAssessment(data, scenarios) {
        const byName = new Map();
        (data.scenario_scores || []).forEach((score) => byName.set(score.scenario, score));

        for (let i = 0; i < 4; i += 1) {
          const card = document.getElementById(`result-${i}`);
          const scenario = scenarios[i];
          if (!scenario) {
            card.innerHTML = `<span><strong>Scenario ${i + 1} likelihood</strong><br>%<br><span class="small">if entered</span></span>`;
            continue;
          }
          const score = byName.get(scenario.name) || data.scenario_scores?.[i];
          card.innerHTML = `<span><strong>${scenario.name}</strong><br>${Math.round(score?.likelihood_percent || 0)}%<br><span class="small">${score?.rationale || ''}</span></span>`;
        }

        const sourceWeightsByName = new Map();
        (data.scenario_scores || []).forEach((score) => {
          (score.source_weights || []).forEach((weight) => {
            const existing = sourceWeightsByName.get(weight.name);
            if (!existing || weight.weighting_percent > existing.weighting_percent) {
              sourceWeightsByName.set(weight.name, weight);
            }
          });
        });
        renderSources(sourceWeightsByName);

        evidence.innerHTML = (data.evidence_articles || []).slice(0, 6).map((article) =>
          `<div><strong>${escapeHtml(article.source)}</strong>: <a href="${escapeAttr(article.url)}" target="_blank" rel="noopener">${escapeHtml(article.title)}</a></div>`
        ).join('');
      }

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
      }
      function escapeAttr(value) { return escapeHtml(value).replace(/'/g, '&#039;'); }

      document.getElementById('add-source').addEventListener('click', () => {
        const name = document.getElementById('new-source-name').value.trim();
        const url = document.getElementById('new-source-url').value.trim();
        const reliability = Number(document.getElementById('new-source-reliability').value || 70);
        if (!name || !url) {
          status.textContent = 'Enter a source name and RSS URL.';
          return;
        }
        state.sources.push({ id: `custom-${Date.now()}`, name, url, reliability: Math.max(0, Math.min(100, reliability)), enabled: true });
        persistSources();
        renderSources();
        document.getElementById('new-source-name').value = '';
        document.getElementById('new-source-url').value = '';
        document.getElementById('new-source-reliability').value = '';
      });

      document.getElementById('new-session').addEventListener('click', () => {
        for (let i = 0; i < 4; i += 1) {
          document.getElementById(`scenario-${i}`).value = '';
          document.getElementById(`signals-${i}`).value = '';
        }
        status.textContent = 'New session started.';
        evidence.innerHTML = '';
        renderEmptyResults();
      });

      renderScenarios();
      renderEmptyResults();
      renderSources();
    })();
  </script>
</body>
</html>
